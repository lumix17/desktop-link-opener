<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Desktop Link Opener</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        width: 280px;
        margin: 0;
        padding: 14px 16px;
        background: #1e1f22;
        color: #dbdee1;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 12px;
        color: #fff;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 10px;
        background: #2b2d31;
        border-radius: 6px;
        margin-bottom: 6px;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .label {
        flex: 1;
        font-size: 13px;
        color: #dbdee1;
      }
      .switch {
        position: relative;
        display: inline-block;
        width: 32px;
        height: 18px;
        flex-shrink: 0;
      }
      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .slider {
        position: absolute;
        cursor: pointer;
        inset: 0;
        background: #4e5058;
        border-radius: 18px;
        transition: background 0.15s;
      }
      .slider::before {
        content: "";
        position: absolute;
        height: 14px;
        width: 14px;
        left: 2px;
        top: 2px;
        background: #fff;
        border-radius: 50%;
        transition: transform 0.15s;
      }
      .switch input:checked + .slider::before {
        transform: translateX(14px);
      }
      .row[data-service="discord"] .switch input:checked + .slider { background: #5865f2; }
      .row[data-service="linear"] .switch input:checked + .slider { background: #5e6ad2; }
      .row[data-service="spotify"] .switch input:checked + .slider { background: #1db954; }
      .hint {
        margin: 10px 2px 0;
        font-size: 11px;
        line-height: 1.4;
        color: #80848e;
      }
    </style>
  </head>
  <body>
    <h1>Desktop Link Opener</h1>

    <div class="row" data-service="discord">
      <span class="dot" style="background: #5865f2"></span>
      <span class="label">Discord</span>
      <label class="switch">
        <input type="checkbox" id="t-discord" />
        <span class="slider"></span>
      </label>
    </div>

    <div class="row" data-service="linear">
      <span class="dot" style="background: #5e6ad2"></span>
      <span class="label">Linear</span>
      <label class="switch">
        <input type="checkbox" id="t-linear" />
        <span class="slider"></span>
      </label>
    </div>

    <div class="row" data-service="spotify">
      <span class="dot" style="background: #1db954"></span>
      <span class="label">Spotify</span>
      <label class="switch">
        <input type="checkbox" id="t-spotify" />
        <span class="slider"></span>
      </label>
    </div>

    <p class="hint">
      Turn off any service you don't have the desktop app for.<br />
      Hold ⌘ / Ctrl while clicking to bypass an enabled service.
    </p>

    <script src="popup.js"></script>
  </body>
</html>
